name: Hourly Dashboard Update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        run: python monitor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force add the main dashboard file to bypass .gitignore restrictions
          git add -f index.html

          # Optional: Add data files if they exist, ignoring errors if they are still blocked
          git add data/*.json || echo "Some data files were ignored or not found."

          # Only commit if there are actual changes to prevent workflow failure
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4